<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Windy Weather Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <h1>🌿 Windy Weather Tracker</h1>

    <div class="parent-card">

      <div class="card">
        <h3>🔍 Search City</h3>
        <div class="input-group">
          <input type="text" id="cityInput" placeholder="Delhi, London, Tokyo..." />
          <button id="searchBtn">Search</button>
        </div>

        <div class="tips">
          <span class="tip-label">Try:</span>
          <button class="tip-chip" data-city="London">London</button>
          <button class="tip-chip" data-city="Tokyo">Tokyo</button>
          <button class="tip-chip" data-city="New York">New York</button>
          <button class="tip-chip" data-city="Mumbai">Mumbai</button>
        </div>

        <h3 style="margin-top: 20px;">📜 Search History</h3>
        <div class="history" id="historyBox"></div>
        <button id="clearHistBtn" class="clear-btn">Clear History</button>
      </div>

      <div class="card">
        <h3>🌤 Weather Info</h3>
        <div id="weatherBox">
          <p class="empty-msg">Search a city to see weather</p>
        </div>
      </div>

    </div>

    <div class="card console-card">
      <div class="console-header">
        <div class="dots"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
        <h3>🖥 Console — Event Loop</h3>
        <button id="clearConsoleBtn" class="clear-console-btn">Clear</button>
      </div>
      <div class="console" id="consoleBox"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
